name: Build and Publish Release Binaries

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_FROZEN: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.eval.outputs.version }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Evaluate version
        id: eval
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f 2 | tr -d ' ')
            LATEST_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "v0.0.0")

            echo "Latest release tag: $LATEST_TAG"
            echo "pyproject.toml version: v$NEW_VERSION"
            if [[ "$LATEST_TAG" == "v"* ]]; then
              OLD_V="${LATEST_TAG#v}"
            else
              OLD_V="$LATEST_TAG"
            fi

            IFS='.' read -r n_maj n_min n_patch <<< "$NEW_VERSION"
            IFS='.' read -r o_maj o_min o_patch <<< "$OLD_V"

            if [ "$n_maj" != "$o_maj" ]; then
              echo "Error: Major version mismatch (new: $n_maj, old: $o_maj)"
              exit 1
            fi

            if [ "$n_min" -le "$o_min" ]; then
              echo "Error: Minor version not strictly higher (new: $n_min, old: $o_min)"
              exit 1
            fi

            echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

  build-binaries:
    needs: prepare
    name: Build bundled binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Build PyInstaller bundle
        run: uv run --with pyinstaller pyinstaller --noconfirm packaging/phids.spec

      - name: Smoke-test launcher help (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/phids/phids --help

      - name: Smoke-test launcher help (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\phids\phids.exe --help

      - name: Smoke-test HTTP endpoint (POSIX)
        if: runner.os != 'Windows' && !env.ACT
        shell: bash
        run: |
          ./dist/phids/phids --host 127.0.0.1 --port 8001 > phids.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          success=0
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8001/ > /dev/null; then
              success=1
              break
            fi
            sleep 1
          done
          if [ "$success" -eq 0 ]; then
            echo "=== APPLICATION LOGS (phids.log) ==="
            cat phids.log
            exit 1
          fi

      - name: Smoke-test HTTP endpoint (Windows)
        if: runner.os == 'Windows' && !env.ACT
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\dist\phids\phids.exe" -ArgumentList @("--host", "127.0.0.1", "--port", "8001") -RedirectStandardOutput "phids_out.log" -RedirectStandardError "phids_err.log" -PassThru
          try {
            $success = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8001/" -ErrorAction Stop
                if ($response.StatusCode -eq 200) {
                  $success = $true
                  break
                }
              } catch {
                # Ignore connection errors and retry
              }
              Start-Sleep -Seconds 1
            }
            if (-not $success) {
              throw "Failed to connect to the application within 30 seconds."
            }
          }
          catch {
            echo "=== APPLICATION LOGS STDOUT (phids_out.log) ==="
            if (Test-Path "phids_out.log") { Get-Content "phids_out.log" } else { echo "No log file found." }
            echo "=== APPLICATION LOGS STDERR (phids_err.log) ==="
            if (Test-Path "phids_err.log") { Get-Content "phids_err.log" } else { echo "No log file found." }
            throw
          }
          finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Archive bundle (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          platform="$(echo '${{ runner.os }}' | tr '[:upper:]' '[:lower:]')"
          archive="phids-${version}-${platform}.tar.gz"
          tar -czf "$archive" -C dist phids
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Archive bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $archive = "phids-$version-windows.zip"
          Compress-Archive -Path .\dist\phids -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    needs: [prepare, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach archives to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          tag_name: ${{ needs.prepare.outputs.version }}
