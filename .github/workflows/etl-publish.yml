name: ETL - Build and Publish Empirical Bio-Database

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Re-fetch all data sources (ignore Parquet caches)"
        type: boolean
        default: false
  schedule:
    # Monthly on the 1st at 03:00 UTC
    - cron: "0 3 1 * *"

permissions:
  contents: read
  id-token: write  # Required for Hugging Face OIDC authentication

env:
  UV_FROZEN: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HF_REPO_ID: "foersben/PHIDS-empirical-database"

jobs:
  build-and-publish:
    name: Run ETL Pipeline and Publish to foersben/PHIDS-empirical-database
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install uv & Python 3.13
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install All Dependencies (core + pipeline group)
        run: uv sync --group pipeline

      - name: Execute ETL Pipeline
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: |
          REFRESH_FLAG=""
          if [ "$FORCE_REFRESH" = "true" ]; then
            REFRESH_FLAG="--force-refresh"
          fi
          uv run --group pipeline python src/data_pipeline/run_all.py $REFRESH_FLAG

      - name: Validate DuckDB Output
        run: |
          test -f src/phids/analytics/bio_database.duckdb \
            || (echo "bio_database.duckdb not found!" && exit 1)
          test -f src/phids/analytics/bio_database.json \
            || (echo "bio_database.json not found!" && exit 1)
          test -f src/data_pipeline/manifest.json \
            || (echo "manifest.json not found!" && exit 1)
          echo "bio_database.duckdb size: $(wc -c < src/phids/analytics/bio_database.duckdb) bytes"
          echo "bio_database.json size:   $(wc -c < src/phids/analytics/bio_database.json) bytes"
          # Quick schema sanity check via DuckDB CLI
          uv run --group pipeline python -c "
          import duckdb, sys
          con = duckdb.connect('src/phids/analytics/bio_database.duckdb', read_only=True)
          tables = ['flora_species','herbivore_species','substances','trigger_rules','diet_matrix','provenance']
          for t in tables:
              n = con.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0]
              print(f'  {t}: {n} rows')
              if n == 0 and t in ('flora_species','herbivore_species','substances'):
                  print(f'ERROR: {t} is empty', file=sys.stderr)
                  sys.exit(1)
          "

      - name: Publish to Hugging Face Hub (foersben/PHIDS-empirical-database)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run --group pipeline python src/data_pipeline/run_all.py \
            --publish \
            --hf-repo "$HF_REPO_ID"

      - name: Upload Artifacts (CI inspection)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bio-database-artifacts
          path: |
            src/phids/analytics/bio_database.duckdb
            src/phids/analytics/bio_database.json
            src/data_pipeline/manifest.json
          retention-days: 30
