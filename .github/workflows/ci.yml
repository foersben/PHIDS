name: CI & Deployment Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  pages: write      # Required for GitHub Pages
  id-token: write   # Required for GitHub Pages

env:
  UV_FROZEN: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-gate:
    name: Code & Context Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv & Python 3.13
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Pre-Commit Hooks
        run: SKIP=check-identity,enforce-author-identity uv run pre-commit run --all-files

      - name: Run Test Suite
        run: uv run pytest

  deploy-docs:
    name: Build & Deploy Documentation
    needs: quality-gate # Only deploys if tests and pre-commit pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv & Python 3.13
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Docs with Zensical
        run: uv run zensical build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
