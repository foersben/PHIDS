services:
  phids:
    build:
      context: .
      dockerfile: Dockerfile
    image: phids:local
    container_name: phids-local
    command: ["phids", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./examples:/app/examples
      - ./README.md:/app/README.md:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
