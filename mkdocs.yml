site_name: PHIDS
site_description: Plant-Herbivore Interaction & Defense Simulator
site_url: https://foersben.github.io/PHIDS/
repo_name: foersben/PHIDS
repo_url: https://github.com/foersben/PHIDS

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - content.code.copy

plugins:
  - search
  - kroki:
      server_url: https://kroki.io
      fence_prefix: ""
      enable_mermaid: false
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/katex.js
  - javascripts/mermaid.js

nav:
  - Home: index.md
  - Scientific Model:
      - Mathematical Framework: scientific_model/mathematical_framework.md
  - Technical Architecture:
      - System Architecture: technical_architecture/system_architecture.md
      - Engine Execution: technical_architecture/engine_execution.md
      - Interfaces & UI: technical_architecture/interfaces_and_ui.md
      - Telemetry: technical_architecture/telemetry.md
  - Scenarios:
      - Scenario Authoring: scenario_guide/scenario_authoring.md
      - Curated Examples: scenario_guide/curated_examples.md
  - Development & Reference:
      - Contribution & Workflows: development_guide/contribution_workflow.md
      - Agent Ecosystem: development_guide/agent_ecosystem.md
      - Module Map: reference/module-map.md
      - Glossary & Concepts: reference/glossary-and-concept-index.md
      - Requirements Traceability: reference/requirements-traceability.md
      - Python API Reference: reference/api.md
      - Legacy Archive: legacy/index.md
