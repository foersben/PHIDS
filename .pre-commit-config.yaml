minimum_pre_commit_version: "3.7.0"
default_stages: [pre-commit]
exclude: ^(site/|docs/legacy/|__pycache__/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Keep our OKF frontmatter template syntax clean
        exclude: ^(\.agents/|docs/)
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: [--ignore-words=.codespell-ignore-words.txt]

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: Mypy
        # Explicitly declare targets, block file string passing, and track changes
        entry: uv run mypy src/phids scripts
        language: system
        files: ^(src/phids/|scripts/|pyproject\.toml)
        pass_filenames: false
        types: [python]

      - id: validate-okf
        name: Enforce Google Open Knowledge Format
        entry: uv run python scripts/validate_okf.py
        language: system
        files: ^(docs/|\.agents/).*\.md$
        pass_filenames: true
