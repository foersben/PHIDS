minimum_pre_commit_version: "3.7.0"
default_stages: [pre-commit]
exclude: ^(site/|docs/legacy/|__pycache__/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Keep our OKF frontmatter template syntax clean
        exclude: ^(\.agents/|docs/)
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: [--ignore-words=.codespell-ignore-words.txt]

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.1.2  # The stable 2026 release version
    hooks:
      - id: reuse

  - repo: local
    hooks:

      - id: mypy
        name: Mypy
        # Explicitly declare targets, block file string passing, and track changes
        entry: uv run mypy src/phids scripts
        language: system
        files: ^(src/phids/|scripts/|pyproject\.toml)
        pass_filenames: false
        types: [python]

      - id: validate-okf
        name: Enforce Google Open Knowledge Format
        entry: uv run python scripts/validate_okf.py
        language: system
        files: ^(docs/|\.agents/).*\.md$
        pass_filenames: true

      - id: nc-license-guard
        name: NC License Guard (no extended imports in core pipeline)
        entry: uv run python scripts/check_no_extended_imports.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        name: Ruff Code Quality Linting
        args: [ --fix, --show-fixes ]
        stages: [ pre-commit ]
      - id: ruff-format
        name: Ruff Layout Formatting
        stages: [ pre-commit ]
