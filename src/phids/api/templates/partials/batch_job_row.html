<!-- Single batch job row fragment for HTMX outerHTML swap on status polling -->
<tr id="batch-row-{{ job.job_id }}"
  hx-get="/api/batch/status/{{ job.job_id }}"
  hx-trigger="every 2s [job.status == 'running']"
  hx-swap="outerHTML"
  class="hover:bg-slate-50 cursor-pointer"
  hx-get="/api/batch/view/{{ job.job_id }}"
  hx-target="#batch-detail"
  onclick="document.getElementById('batch-detail').classList.remove('hidden')">
  <td class="py-1.5 pr-3 font-mono text-slate-700">{{ job.job_id }}</td>
  <td class="py-1.5 pr-3 text-slate-600">{{ job.scenario_name }}</td>
  <td class="py-1.5 pr-3">
    <span class="rounded-full px-2 py-0.5 font-medium text-[10px]
      {% if job.status == 'done' %}bg-emerald-100 text-emerald-700
      {% elif job.status == 'running' %}bg-indigo-100 text-indigo-700 animate-pulse
      {% elif job.status == 'failed' %}bg-red-100 text-red-700
      {% else %}bg-slate-100 text-slate-500{% endif %}">
      {{ job.status }}
    </span>
  </td>
  <td class="py-1.5 pr-3">
    <div class="flex items-center gap-2">
      <div class="w-20 bg-slate-200 rounded-full h-1.5">
        <div class="bg-indigo-500 h-1.5 rounded-full transition-all"
          style="width: {{ ((job.completed / job.total) * 100)|int if job.total > 0 else 0 }}%"></div>
      </div>
      <span class="text-[10px] text-slate-500">{{ job.completed }}/{{ job.total }}</span>
    </div>
  </td>
  <td class="py-1.5 text-slate-400 text-[10px]">{{ job.started_at[:16] if job.started_at else '—' }}</td>
</tr>
