<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHIDS – Control Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    /* Enforce consistent Noto Color Emoji rendering across all OS platforms (Mac/Windows/Linux) */
    body {
      font-family: ui-sans-serif, system-ui, sans-serif, "Noto Color Emoji";
    }
  </style>
</head>
<body class="h-screen w-full flex bg-slate-50 text-slate-900 overflow-hidden">

  <!-- ── Sidebar ────────────────────────────────────────────────────── -->
  <aside class="w-64 bg-slate-900 text-slate-100 flex flex-col shadow-xl z-10 shrink-0">
    <div class="p-6 border-b border-slate-700 flex justify-center items-center bg-slate-900">
      <img src="/static/logo.png" alt="PHIDS Logo" class="w-full aspect-square object-contain rounded-xl bg-slate-800 p-3 shadow-inner border border-slate-700">
    </div>

    <nav class="flex-1 overflow-y-auto p-4 space-y-6">
      <!-- Views -->
      <div>
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Views</h2>
        <ul class="space-y-1">
          <li>
            <button hx-get="/ui/dashboard" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              📊 Dashboard
            </button>
          </li>
          <li>
            <button hx-get="/ui/placements" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🗺️ Placement Editor
            </button>
          </li>
          <li>
            <button hx-get="/ui/biotope" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🌍 Biotope Config
            </button>
          </li>
          <li>
            <button hx-get="/ui/batch" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🎲 Batch Runner
            </button>
          </li>
        </ul>
      </div>

      <!-- Rule of 16 Entities -->
      <div>
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
          Rule of 16 Entities
        </h2>
        <ul class="space-y-1">
          <li>
            <button hx-get="/ui/database" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-indigo-300 text-sm transition-colors">
              🗃️ Bio-Database Catalog
            </button>
          </li>
          <li>
            <button hx-get="/ui/flora" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🌿 Flora Species
            </button>
          </li>
          <li>
            <button hx-get="/ui/herbivores" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🐛 Herbivores
            </button>
          </li>
          <li>
            <button hx-get="/ui/substances" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🧪 Substances
            </button>
          </li>
        </ul>
      </div>

      <!-- Interactions -->
      <div>
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
          Interactions
        </h2>
        <ul class="space-y-1">
          <li>
            <button hx-get="/ui/diet-matrix" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🍽️ Diet Matrix
            </button>
          </li>
          <li>
            <button hx-get="/ui/morphology-defense" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm transition-colors">
              🛡️ Morphology & Defense
            </button>
          </li>
        </ul>
      </div>

      <!-- Optimizer -->
      <div>
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
          Optimizer
        </h2>
        <ul class="space-y-1">
          <li>
            <button hx-get="/ui/dse" hx-target="#main-workspace" hx-swap="innerHTML"
              class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-indigo-300 text-sm transition-colors">
              🧬 Run DSE Optimizer
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <!-- File I/O -->
    <div class="p-4 border-t border-slate-700 space-y-2">
      <a href="/api/scenario/export"
        class="block w-full text-center px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400">
        📥 Export JSON
      </a>
      <label class="block w-full text-center px-3 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm cursor-pointer transition-colors has-[:focus-visible]:ring-2 has-[:focus-visible]:ring-indigo-400 has-[:focus-visible]:outline-none">
        📤 Import JSON
        <input type="file" accept=".json" class="sr-only" id="scenario-import-input"
          onchange="phidsUploadScenario(this)">
      </label>
    </div>
  </aside>

  <!-- ── Main area ──────────────────────────────────────────────────── -->
  <div class="flex-1 flex h-screen overflow-hidden">

    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Sticky header -->
      <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-4">
          <span class="font-semibold text-slate-700" id="scenario-name">{{ scenario_name }}</span>
          <span id="draft-save-indicator" class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-500"
            title="Draft autosave status for builder edits.">Draft idle</span>
          <span class="text-sm text-slate-500">
            Tick:&nbsp;<span id="tick-counter"
              hx-get="/api/ui/tick" hx-trigger="every 1s" hx-swap="innerHTML"
              class="font-mono font-bold text-indigo-600">0</span>
          </span>
        </div>
        <div class="flex items-center gap-2">
          <form hx-put="/api/simulation/tick-rate"
            hx-target="#sim-status" hx-swap="outerHTML"
            hx-trigger="change"
            class="flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1">
            <label for="live-tick-rate" class="text-xs text-slate-500">Speed (Hz)</label>
            <input id="live-tick-rate" type="number" name="tick_rate_hz" min="0.1" step="0.1"
              value="{{ default_tick_rate_hz | default(10.0) }}"
              class="w-20 border border-slate-300 rounded px-2 py-1 text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"
              title="Live simulation tick rate in ticks per second. Adjusts background run speed without reloading the scenario.">
          </form>
          <button hx-post="/api/simulation/start"
            hx-include="#biotope-config-view form"
            hx-target="#sim-status" hx-swap="outerHTML"
            class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 active:scale-95 active:brightness-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-emerald-500 text-white rounded-lg text-sm font-medium transition-all">
            ▶ Start
          </button>
          <button hx-post="/api/simulation/pause"
            hx-target="#sim-status" hx-swap="outerHTML"
            class="px-4 py-2 bg-amber-500 hover:bg-amber-600 active:scale-95 active:brightness-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-amber-500 text-white rounded-lg text-sm font-medium transition-all">
            ⏸ Pause
          </button>
          <button hx-post="/api/simulation/step"
            hx-include="#biotope-config-view form"
            hx-target="#sim-status" hx-swap="outerHTML"
            class="px-4 py-2 bg-sky-500 hover:bg-sky-600 active:scale-95 active:brightness-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-sky-500 text-white rounded-lg text-sm font-medium transition-all">
            ⏭ Step
          </button>
          <button hx-post="/api/simulation/reset"
            hx-include="#biotope-config-view form"
            hx-target="#sim-status" hx-swap="outerHTML"
            hx-on::after-request="if (event.detail.successful) phidsHandleScenarioLoaded();"
            class="px-4 py-2 bg-rose-500 hover:bg-rose-600 active:scale-95 active:brightness-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-rose-500 text-white rounded-lg text-sm font-medium transition-all">
            ↺ Reset
          </button>
          <button hx-post="/api/scenario/load-draft"
            hx-include="#biotope-config-view form"
            hx-target="#sim-status" hx-swap="outerHTML"
            hx-on::after-request="if (event.detail.successful) phidsHandleScenarioLoaded();"
            class="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 active:scale-95 active:brightness-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-indigo-500 text-white rounded-lg text-sm font-medium transition-all">
            🔄 Load Draft
          </button>
          <span id="sim-status"
            hx-get="/api/ui/status-badge" hx-trigger="every 2s" hx-swap="outerHTML"
            class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-500">Idle</span>
        </div>
      </header>

      <!-- Scrollable workspace -->
      <main id="main-workspace" class="flex-1 overflow-auto p-6">
        {% block content %}{% endblock %}
      </main>
    </div>

    <aside id="diagnostics-rail"
      class="hidden xl:flex w-[24rem] border-l border-slate-200 bg-white/95 backdrop-blur-sm flex-col shadow-inner shrink-0 transition-[width] duration-200 ease-out">
      <div id="diagnostics-expanded-shell" class="flex h-full flex-col min-w-0">
        <div class="px-4 py-3 border-b border-slate-200 flex items-center justify-between gap-3 bg-slate-50/80">
          <div>
            <h2 class="text-sm font-semibold text-slate-700">Diagnostics</h2>
            <p class="text-[11px] text-slate-500">Live model, frontend and backend checks</p>
          </div>
          <button type="button" id="diagnostics-toggle"
            class="group inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-[11px] font-medium text-slate-600 hover:bg-slate-100 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
            <span class="font-mono text-slate-400 group-hover:text-slate-600">⟩</span>
            <span>Collapse</span>
          </button>
        </div>
        <div class="px-2 py-2 border-b border-slate-200 bg-slate-50/60 flex flex-wrap gap-2" id="diagnostics-tabs">
          <button type="button"
            class="diagnostics-tab rounded-lg bg-indigo-100 px-2.5 py-1 text-xs font-medium text-indigo-700 hover:bg-indigo-200 transition-colors"
            data-tab-key="model" data-diagnostics-url="/ui/diagnostics/model">Model</button>
          <button type="button"
            class="diagnostics-tab rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600 hover:bg-slate-200 transition-colors"
            data-tab-key="frontend" data-diagnostics-url="/ui/diagnostics/frontend">Frontend</button>
          <button type="button"
            class="diagnostics-tab rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600 hover:bg-slate-200 transition-colors"
            data-tab-key="backend" data-diagnostics-url="/ui/diagnostics/backend">Backend</button>
        </div>
        <div id="diagnostics-content"
          data-diagnostics-url="/ui/diagnostics/model"
          data-tab-key="model"
          class="flex-1 overflow-auto p-4 space-y-4"></div>
      </div>

      <div id="diagnostics-collapsed-shell" class="hidden h-full flex-col items-center gap-3 bg-slate-50/90 px-2 py-3">
        <div>
          <button type="button" id="diagnostics-expand-collapsed"
            class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-100 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
            title="Expand diagnostics" aria-label="Expand diagnostics">⟨</button>
        </div>
        <button type="button" class="diagnostics-tab-collapsed h-9 w-9 rounded-lg bg-indigo-100 text-indigo-700 hover:bg-indigo-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
          data-tab-key="model" data-diagnostics-url="/ui/diagnostics/model" title="Model diagnostics" aria-label="Model diagnostics">◫</button>
        <button type="button" class="diagnostics-tab-collapsed h-9 w-9 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
          data-tab-key="frontend" data-diagnostics-url="/ui/diagnostics/frontend" title="Frontend diagnostics" aria-label="Frontend diagnostics">⌘</button>
        <button type="button" class="diagnostics-tab-collapsed h-9 w-9 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
          data-tab-key="backend" data-diagnostics-url="/ui/diagnostics/backend" title="Backend logs" aria-label="Backend logs">☰</button>
      </div>
    </aside>
  </div>

  <!-- Scenario import helper (isolated vanilla JS) -->
  <script>
    window.__phidsFrontendDiagnostics = window.__phidsFrontendDiagnostics || {
      activeView: 'dashboard',
      wsState: 'idle',
      lastUiTick: null,
      lastTooltipCell: null,
      lastDashboardMessageAt: null,
      renderMode: 'preview',
      notes: ['Waiting for dashboard controller updates.'],
    };

    function phidsHandleScenarioLoaded() {
      const tickCounter = document.getElementById('tick-counter');
      if (tickCounter) tickCounter.textContent = '0';
      htmx.ajax('GET', '/ui/dashboard', { target: '#main-workspace', swap: 'innerHTML' });
      const diagnostics = window.__phidsFrontendDiagnostics || {};
      const notes = Array.isArray(diagnostics.notes) ? diagnostics.notes : [];
      notes.unshift(`[${new Date().toLocaleTimeString()}] Scenario loaded into live simulation and dashboard refresh requested.`);
      diagnostics.notes = notes.slice(0, 15);
      diagnostics.renderMode = 'live';
      window.__phidsFrontendDiagnostics = diagnostics;
      if (typeof window.phidsRefreshDiagnostics === 'function') {
        window.phidsRefreshDiagnostics(true);
      }
    }

    async function phidsUploadScenario(input) {
      if (!input.files.length) return;
      const formData = new FormData();
      formData.append('file', input.files[0]);
      const name = input.files[0].name.replace(/\.json$/i, '');
      const resp = await fetch('/api/scenario/import', { method: 'POST', body: formData });
      if (resp.ok) {
        const loadResp = await fetch('/api/scenario/load-draft', {
          method: 'POST',
          headers: { 'HX-Request': 'true' },
        });
        if (!loadResp.ok) {
          const loadText = await loadResp.text();
          alert('Import succeeded, but loading the live simulation failed: ' + loadText);
          input.value = '';
          return;
        }
        const simStatus = document.getElementById('sim-status');
        if (simStatus) simStatus.outerHTML = await loadResp.text();
        document.getElementById('scenario-name').textContent = name;
        phidsHandleScenarioLoaded();
      } else {
        const txt = await resp.text();
        alert('Import failed: ' + txt);
      }
      input.value = '';
    }

    (function () {
      function setDraftIndicator(state, message) {
        const el = document.getElementById('draft-save-indicator');
        if (!el) return;
        if (state === 'saving') {
          el.className = 'text-xs px-2 py-1 rounded bg-amber-100 text-amber-700';
          el.textContent = message || 'Saving draft...';
          return;
        }
        if (state === 'saved') {
          el.className = 'text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700';
          el.textContent = message || 'Draft saved';
          return;
        }
        el.className = 'text-xs px-2 py-1 rounded bg-red-100 text-red-700';
        el.textContent = message || 'Draft save failed';
      }

      document.body.addEventListener('htmx:beforeRequest', function (event) {
        const path = event?.detail?.pathInfo?.requestPath || '';
        if (path.startsWith('/api/config/')) {
          setDraftIndicator('saving');
        }
      });

      document.body.addEventListener('htmx:afterRequest', function (event) {
        const path = event?.detail?.pathInfo?.requestPath || '';
        if (path.startsWith('/api/config/')) {
          setDraftIndicator(event?.detail?.successful ? 'saved' : 'error');
          return;
        }
        if (path === '/api/scenario/load-draft' || path === '/api/simulation/start') {
          if (event?.detail?.successful) {
            setDraftIndicator('saved', 'Draft applied to live loop');
          }
        }
      });
    })();

    (function () {
      const rail = document.getElementById('diagnostics-rail');
      const toggle = document.getElementById('diagnostics-toggle');
      const expandCollapsed = document.getElementById('diagnostics-expand-collapsed');
      const expandedShell = document.getElementById('diagnostics-expanded-shell');
      const collapsedShell = document.getElementById('diagnostics-collapsed-shell');
      const content = document.getElementById('diagnostics-content');
      const tabs = Array.from(document.querySelectorAll('[data-diagnostics-url]'));
      if (!rail || !toggle) return;

      const STORAGE_COLLAPSED = 'phids.diagnostics.collapsed';
      const STORAGE_ACTIVE_TAB = 'phids.diagnostics.activeTab';
      let collapsed = localStorage.getItem(STORAGE_COLLAPSED) === 'true';
      let activeTab = localStorage.getItem(STORAGE_ACTIVE_TAB) || 'model';
      let refreshTimer = null;

      function setCollapsed(nextCollapsed) {
        collapsed = Boolean(nextCollapsed);
        localStorage.setItem(STORAGE_COLLAPSED, collapsed ? 'true' : 'false');
        rail.classList.toggle('w-[24rem]', !collapsed);
        rail.classList.toggle('w-[4.25rem]', collapsed);
        if (expandedShell) expandedShell.classList.toggle('hidden', collapsed);
        if (collapsedShell) collapsedShell.classList.toggle('hidden', !collapsed);
      }

      function syncTabStyles() {
        tabs.forEach(tab => {
          const isActive = tab.dataset.tabKey === activeTab;
          tab.classList.toggle('bg-indigo-100', isActive);
          tab.classList.toggle('text-indigo-700', isActive);
          tab.classList.toggle('bg-slate-100', !isActive);
          tab.classList.toggle('text-slate-600', !isActive);
        });
      }

      function loadDiagnostics(url, tabKey, { force = false, expand = false } = {}) {
        if (!content || !url || !tabKey) return;
        activeTab = tabKey;
        localStorage.setItem(STORAGE_ACTIVE_TAB, activeTab);
        syncTabStyles();
        if (expand) setCollapsed(false);

        if (!force) {
          if (tabKey === 'backend') {
            const scroller = content.querySelector('.overflow-auto');
            // If the user has scrolled down to read older history, don't interrupt them with a refresh
            if (scroller && scroller.scrollTop > 15) {
              return;
            }
          }
        }

        content.dataset.diagnosticsUrl = url;
        content.dataset.tabKey = tabKey;
        htmx.ajax('GET', url, { target: '#diagnostics-content', swap: 'innerHTML' });
      }

      function refreshDiagnostics(force = false) {
        if (!content || collapsed || document.hidden) return;
        const url = content.dataset.diagnosticsUrl;
        const tabKey = content.dataset.tabKey || activeTab;
        if (!url || tabKey === 'frontend') return;
        loadDiagnostics(url, tabKey, { force });
      }

      window.phidsRefreshDiagnostics = refreshDiagnostics;

      toggle.addEventListener('click', function () {
        setCollapsed(true);
      });
      expandCollapsed?.addEventListener('click', function () {
        setCollapsed(false);
        refreshDiagnostics(true);
      });

      tabs.forEach(tab => {
        tab.addEventListener('click', function () {
          loadDiagnostics(tab.dataset.diagnosticsUrl, tab.dataset.tabKey, {
            force: true,
            expand: tab.classList.contains('diagnostics-tab-collapsed'),
          });
        });
      });

      setCollapsed(collapsed);
      syncTabStyles();
      loadDiagnostics(`/ui/diagnostics/${activeTab}`, activeTab, { force: true });
      refreshTimer = window.setInterval(() => refreshDiagnostics(false), 1000);

      document.body.addEventListener('htmx:beforeRequest', function (event) {
        const source = event.target.closest?.('[hx-get]');
        const url = source?.getAttribute?.('hx-get') || '';
        if (url.startsWith('/ui/') && !url.startsWith('/ui/diagnostics/')) {
          const diagnostics = window.__phidsFrontendDiagnostics || {};
          diagnostics.activeView = url.replace('/ui/', '') || 'dashboard';
          const notes = Array.isArray(diagnostics.notes) ? diagnostics.notes : [];
          notes.unshift(`[${new Date().toLocaleTimeString()}] HTMX requested ${url} for the main workspace.`);
          diagnostics.notes = notes.slice(0, 15);
          window.__phidsFrontendDiagnostics = diagnostics;
          window.dispatchEvent(new CustomEvent('phids:frontend-diagnostics', { detail: diagnostics }));
        }
      });

      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) refreshDiagnostics(true);
      });
    })();
  </script>
  <script>
    // Dual-control sync logic for UI parameters
    document.addEventListener('input', (e) => {
      // Sync from slider to number input
      if (e.target.matches('input[type="range"].sync-slider')) {
        const numberInput = document.getElementById(e.target.dataset.syncId);
        if (numberInput) {
          if (e.target.dataset.scale === 'log') {
            const minSlider = parseFloat(e.target.min) || 0;
            const maxSlider = parseFloat(e.target.max) || 100;
            const minLog = Math.log(parseFloat(e.target.dataset.logMin) || 1);
            const maxLog = Math.log(parseFloat(e.target.dataset.logMax) || 10000);

            const scale = (maxLog - minLog) / (maxSlider - minSlider);
            const val = Math.exp(minLog + scale * (parseFloat(e.target.value) - minSlider));

            numberInput.value = Math.round(val);
          } else {
            numberInput.value = e.target.value;
          }
        }
      }

      // Sync from number input to slider
      if (e.target.matches('input[type="number"].sync-number')) {
        const sliderInput = document.getElementById(e.target.dataset.syncId);
        if (sliderInput) {
          if (sliderInput.dataset.scale === 'log') {
            const minSlider = parseFloat(sliderInput.min) || 0;
            const maxSlider = parseFloat(sliderInput.max) || 100;
            const minLog = Math.log(parseFloat(sliderInput.dataset.logMin) || 1);
            const maxLog = Math.log(parseFloat(sliderInput.dataset.logMax) || 10000);

            const val = parseFloat(e.target.value);
            if (val > 0) {
              const scale = (maxLog - minLog) / (maxSlider - minSlider);
              const targetVal = (Math.log(val) - minLog) / scale + minSlider;
              sliderInput.value = targetVal;
            }
          } else {
            sliderInput.value = e.target.value;
          }
        }
      }
    });

    document.addEventListener('change', (e) => {
      // When slider drag ends, notify HTMX via the number input
      if (e.target.matches('input[type="range"].sync-slider')) {
        const numberInput = document.getElementById(e.target.dataset.syncId);
        if (numberInput) {
          numberInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
      }
    });
  </script>



  <!-- Navigation Menu Highlighting -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const activeClasses = ["bg-indigo-600/20", "border", "border-indigo-500/30", "font-medium", "text-indigo-300"];
      const inactiveHoverClass = "hover:bg-slate-700";

      const menuItems = document.querySelectorAll("nav button[hx-get]");

      // We need to know which items naturally have text-indigo-300 so we don't strip it
      const naturallyIndigo = new Set();
      menuItems.forEach(btn => {
        if (btn.classList.contains('text-indigo-300')) {
          naturallyIndigo.add(btn);
        }
      });

      function setActiveItem(targetButton) {
        menuItems.forEach(btn => {
          activeClasses.forEach(cls => {
            if (cls === 'text-indigo-300' && naturallyIndigo.has(btn)) {
              return; // Don't remove if it belongs there naturally
            }
            btn.classList.remove(cls);
          });
          btn.classList.add(inactiveHoverClass);
        });

        if (targetButton) {
          targetButton.classList.remove(inactiveHoverClass);
          activeClasses.forEach(cls => targetButton.classList.add(cls));
        }
      }

      // Initial state: Dashboard is active
      const dashboardBtn = document.querySelector("button[hx-get='/ui/dashboard']");
      if (dashboardBtn) {
        setActiveItem(dashboardBtn);
      }

      // Update on click
      menuItems.forEach(btn => {
        btn.addEventListener("click", function() {
          setActiveItem(this);
        });
      });

      // Listen for HTMX swaps
      document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        const url = evt.detail.requestConfig.path;
        if (url && url.startsWith('/ui/')) {
          const btn = document.querySelector(`button[hx-get="${url}"]`);
          if (btn) setActiveItem(btn);
        }
      });
    });
  </script>
